name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (py${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 8  # evidence freshness tests allow bundles up to 5 commits behind HEAD

      - name: Configure git identity (for tests that init tmp repos)
        run: |
          git config --global user.email "ci@merge-train.test"
          git config --global user.name "merge_train CI"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Show versions
        # `head` closes the pipe early; under bash's default pipefail this
        # can surface as SIGPIPE (exit 141) on slow runners. Tolerate it.
        run: |
          set +o pipefail
          python --version
          git --version
          pip show merge_train | head -5

      - name: Run pytest
        run: python -m pytest tests/ -q

  installer-smoke:
    name: install.sh smoke (ubuntu-latest)
    runs-on: ubuntu-latest
    needs: pytest
    steps:
      - name: Checkout merge_train
        uses: actions/checkout@v4
        with:
          path: merge_train

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure git identity
        run: |
          git config --global user.email "ci@merge-train.test"
          git config --global user.name "merge_train CI"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create a fresh target repo
        run: |
          mkdir -p target_repo
          cd target_repo
          git init -q -b main

      - name: Run install.sh against the target repo
        run: ./merge_train/install.sh "$(pwd)/target_repo"

      - name: Verify install artifacts
        run: |
          set +o pipefail
          test -f target_repo/file_domains.yaml || { echo "skeleton not created"; exit 1; }
          test -L target_repo/.git/hooks/pre-commit || { echo "hook not symlinked"; exit 1; }
          domain_lock --help | head -5

      - name: Re-run install.sh (idempotency check)
        run: ./merge_train/install.sh "$(pwd)/target_repo" 2>&1 | tee rerun.log
        # The re-run must NOT clobber the yaml or the hook.

      - name: Confirm idempotent — yaml + hook untouched
        run: |
          grep -q "already exists, leaving untouched" rerun.log
          grep -q "already symlinked" rerun.log
